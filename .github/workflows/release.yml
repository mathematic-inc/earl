name: Release

on:
  push:
    tags:
      - "v*"
      - "*-v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always

jobs:
  meta:
    name: Resolve Release Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
      is_root: ${{ steps.meta.outputs.is_root }}
      crate_name: ${{ steps.meta.outputs.crate_name }}
      crate_path: ${{ steps.meta.outputs.crate_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Parse tag and validate
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" =~ ^v[0-9] ]]; then
            IS_ROOT=true
            CRATE_NAME="earl"
            CRATE_PATH="."
            VERSION="${TAG#v}"
            CARGO_VERSION="$(awk -F'"' '/^\[package\]/{p=1} p && /^version = /{print $2; exit}' Cargo.toml)"
          else
            IS_ROOT=false
            CRATE_NAME="${TAG%-v*}"
            CRATE_PATH="crates/$CRATE_NAME"
            VERSION="${TAG#*-v}"
            if [[ ! -f "$CRATE_PATH/Cargo.toml" ]]; then
              echo "crate path $CRATE_PATH does not exist for tag $TAG" >&2
              exit 1
            fi
            CARGO_VERSION="$(awk -F'"' '/^\[package\]/{p=1} p && /^version = /{print $2; exit}' "$CRATE_PATH/Cargo.toml")"
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "tag $TAG does not match supported format vX.Y.Z or vX.Y.Z-rc.N" >&2
            exit 1
          fi

          if [[ "$VERSION" != "$CARGO_VERSION" ]]; then
            echo "tag version $VERSION must match Cargo.toml version $CARGO_VERSION" >&2
            exit 1
          fi

          IS_PRERELEASE=false
          if [[ "$VERSION" == *-* ]]; then
            IS_PRERELEASE=true
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "is_root=$IS_ROOT" >> "$GITHUB_OUTPUT"
          echo "crate_name=$CRATE_NAME" >> "$GITHUB_OUTPUT"
          echo "crate_path=$CRATE_PATH" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"

  build-and-test:
    name: Build and test
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8

      - name: Build and test
        shell: bash
        run: |
          if [[ "${{ needs.meta.outputs.is_root }}" == "true" ]]; then
            cargo test --locked
          else
            cargo test --locked -p "${{ needs.meta.outputs.crate_name }}"
          fi

  build-artifacts:
    name: Build ${{ matrix.target }}
    needs: meta
    if: needs.meta.outputs.is_root == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: aarch64-apple-darwin
            build_tool: cargo
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build_tool: cargo
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            build_tool: cargo
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            build_tool: cargo
          - os: ubuntu-latest
            target: x86_64-pc-windows-msvc
            build_tool: xwin
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8

      - name: Install cross-compilation toolchain (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Install cross-compilation toolchain (musl)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cargo-xwin and LLVM
        if: matrix.build_tool == 'xwin'
        shell: bash
        run: |
          sudo apt-get update && sudo apt-get install -y llvm
          cargo install cargo-xwin --locked

      - name: Build and package
        shell: bash
        run: |
          scripts/release/build-artifact.sh \
            --target "${{ matrix.target }}" \
            --version "${{ needs.meta.outputs.version }}" \
            --build-tool "${{ matrix.build_tool }}" \
            --output-dir dist

      - name: Upload artifact archive
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: build-${{ matrix.target }}
          path: dist/*

  release-assets:
    name: Assemble Release Assets
    needs:
      - meta
      - build-artifacts
    if: needs.meta.outputs.is_root == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download binary archives
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: build-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: scripts/release/generate-checksums.sh dist

      - name: Upload complete release assets
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-assets
          path: dist/*

  create-release:
    name: Publish GitHub Release
    needs:
      - meta
      - build-and-test
      - release-assets
    if: |
      always() &&
      needs.meta.result == 'success' &&
      needs.build-and-test.result == 'success' &&
      (needs.release-assets.result == 'success' || needs.release-assets.result == 'skipped')
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download release assets
        if: needs.meta.outputs.is_root == 'true'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-assets
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          name: ${{ needs.meta.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ needs.meta.outputs.is_prerelease == 'true' }}
          files: ${{ needs.meta.outputs.is_root == 'true' && 'dist/*' || '' }}
          fail_on_unmatched_files: ${{ needs.meta.outputs.is_root == 'true' }}
          make_latest: ${{ needs.meta.outputs.is_root == 'true' && needs.meta.outputs.is_prerelease == 'false' }}

      - name: Trigger release notes workflow
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          gh workflow run release-notes.yml \
            --field tag="${{ needs.meta.outputs.tag }}"

  attest-provenance:
    name: Attest Build Provenance
    needs:
      - meta
      - create-release
    if: needs.create-release.result == 'success' && needs.meta.outputs.is_root == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - name: Download release assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-assets
          path: dist
      - name: Attest release assets
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: |
            dist/*

  publish-crate:
    name: Publish to crates.io
    needs:
      - meta
      - create-release
    if: always() && needs.meta.result == 'success' && needs.create-release.result == 'success'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8

      - name: Authenticate with crates.io
        uses: rust-lang/crates-io-auth-action@b7e9a28eded4986ec6b1fa40eeee8f8f165559ec # v1.0.3
        id: crates-io-auth

      - name: Publish workspace crates
        if: needs.meta.outputs.is_root == 'true'
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}
        run: |
          set -euo pipefail

          # Publish in dependency order: earl-core first, then protocol
          # crates, and finally the root earl crate.
          CRATES=(
            earl-core
            earl-protocol-http
            earl-protocol-grpc
            earl-protocol-bash
            earl-protocol-sql
            earl-protocol-browser
            earl
          )

          for crate in "${CRATES[@]}"; do
            echo "Publishing $crate..."
            output=$(cargo publish --locked -p "$crate" 2>&1) && echo "$output" || {
              if echo "$output" | grep -q "already exists on crates.io index"; then
                echo "$crate already published, skipping."
              else
                echo "$output" >&2
                exit 1
              fi
            }

            # Wait for crates.io index to update before publishing
            # dependents (skip delay after the last crate).
            if [[ "$crate" != "earl" ]]; then
              sleep 30
            fi
          done

      - name: Publish crate
        if: needs.meta.outputs.is_root != 'true'
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}
        run: cargo publish --locked -p "${{ needs.meta.outputs.crate_name }}"
