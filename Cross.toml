[target.x86_64-unknown-linux-musl]
pre-build = [
    "apt-get update && apt-get install -y musl-tools libdbus-1-dev libssl-dev pkg-config",
]

[target.aarch64-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture arm64",
    "apt-get update && apt-get install -y libdbus-1-dev:arm64 libssl-dev:arm64 pkg-config",
]
